name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: SyEdArHaM22
          outputs: |
            github-snake.svg
            github-snake-dark.svg?palette=github-dark

      - name: Push snake to output branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan output || git checkout output
          git rm -rf . --ignore-unmatch
          mv github-snake.svg github-snake-dark.svg ./  2>/dev/null || true
          git add github-snake.svg github-snake-dark.svg
          git commit -m "Generate snake animation"
          git push origin output --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
